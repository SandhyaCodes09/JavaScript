<!-- build a simple webpage where pressing any key on the keyboard displays the key
  pressed and its corresponding key code using an event listener in javascript -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <div class="container">
    <input type="text" id="keyboard" />

    <div id="keycode">
      <p id="text">keycode</p>
      <p id="ans"></p>
    </div>

    <div id="keyboard1">
      <p id="key-pressed">Key Pressed</p>
      <p id="key-text"></p>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
