<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <input type="checkbox" id="toggle" class="toggle-checkbox hidden"/>
        <div class="form-container sign-up">
            <form action="">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <div class="icon">
                        <i class="fa-brands fa-google"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-facebook"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-linkedin"></i>
                    </div>
                </div>
                <span>or use your email for registration</span>
                <input type="text" id="name" name="name" placeholder="Enter Your Name" />
                <input type="email" id="email" name="email" placeholder="Enter Your Email" />
                <input type="password" name="password" id="password" placeholder="Enter Your Password" />
                <button>SignUp</button>
            </form>
        </div>

        <div class="form-container login-in">
            <form action="">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <div class="icon">
                        <i class="fa-brands fa-google"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-facebook"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <div class="icon">
                        <i class="fa-brands fa-linkedin"></i>
                    </div>
                </div>
                <span>or use your email or password for login</span>
                <input type="email" id="email" name="email" placeholder="Enter Your Email" />
                <input type="password" name="password" id="password" placeholder="Enter Your Password" />
                <a href="#">Forgot Password?</a>
                <button>Login</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <label for="toggle" class="btn">Sign In</label>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <label for="toggle" class="btn">Sign Up</label>
                </div>
            </div>

    </div>


</body>

</html>
